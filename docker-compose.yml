version: '3.8'

services:
  # --- Backend Service (Node.js + SQLite) ---
  backend:
    build: ./backend
    container_name: lifeline-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
    restart: always

  # --- Frontend Service (React + Vite) ---
  frontend:
    build: ./frontend
    container_name: lifeline-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
    restart: always

  # --- Simulation Service (Python) ---
  simulation:
    build:
      context: .
      dockerfile: Dockerfile.simulation
    container_name: lifeline-simulation
    environment:
      - BACKEND_HOST=backend
    depends_on:
      - backend
    restart: on-failure

networks:
  default:
    name: lifeline-network
